# APP
application:
  version: @project.version@

# SPRING
spring:
  profiles:
    active: dev

  application:
    name: room-reservation-api

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console